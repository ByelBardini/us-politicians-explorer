server {
  # 8080 (não 80) para bater com a porta que o README e o compose publicam,
  # e porque uma porta alta não exige privilégio de root para escutar.
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # O bundle tem hash no nome: o conteúdo de um arquivo /assets/*.js nunca muda,
  # só o nome. Por isso cache longo aqui...
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # ...e nenhum no index.html, que é justamente quem aponta para o hash novo.
  # Sem isto, um deploy novo ficaria invisível atrás do cache do navegador.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Fallback de SPA: o React Router resolve as rotas no cliente, então qualquer
  # caminho desconhecido devolve o index.html em vez de um 404 do nginx. É o que
  # faz um F5 em /politicos/123 funcionar.
  location / {
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  # Abaixo disto o overhead do gzip não compensa.
  gzip_min_length 1024;
}
